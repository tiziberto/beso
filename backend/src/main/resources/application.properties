spring.datasource.url=jdbc:mariadb://database:3306/app
spring.datasource.username=admin
spring.datasource.password=admin

# Indicar a Spring que ejecute los scripts siempre al iniciar
spring.sql.init.mode=always

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# ── Correo saliente (Gmail SMTP) ──────────────────────────────────────────────
# Pasos para activar:
#   1. Ir a myaccount.google.com → Seguridad → Verificación en 2 pasos (activar)
#   2. Ir a myaccount.google.com → Seguridad → Contraseñas de aplicaciones
#   3. Generar contraseña para "Correo / Windows" y pegarla abajo
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:TU_EMAIL@gmail.com}
spring.mail.password=${MAIL_PASSWORD:TU_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Evita que Spring intente conectar al SMTP al arrancar
spring.mail.test-connection=false

# URL pública del sistema (para los links de confirmar/cancelar en el email)
ecomed.app.url=http://localhost:8080
ecomed.mail.from=ECOMED <${MAIL_USERNAME:noreply@ecomed.com}>