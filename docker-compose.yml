services:

  database:
    image: mariadb:11
    container_name: mi_mariadb
    restart: always
    environment:
      MARIADB_DATABASE: app
      MARIADB_USER: admin
      MARIADB_PASSWORD: admin
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: mi_backend
    ports:
      - "8080:8080"
    depends_on:
      - database
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://database:3306/app
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      # ── Email: reemplazá con tus credenciales reales ──
      MAIL_USERNAME: bemotech.ok@gmail.com
      MAIL_PASSWORD: sgaq qbms gsvd zduy

  frontend:
    build: ./frontend
    container_name: mi_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  mysql-legacy:
    image: mariadb:10.6 # Versión equivalente a MySQL 5.7 con soporte nativo ARM
    container_name: mysql_legacy_3309
    ports:
      - "3309:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=root_password
      - MARIADB_DATABASE=db_importacion
    volumes:
      - ./data/mysql_legacy:/var/lib/mysql

volumes:
  mariadb_data: